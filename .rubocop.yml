---
AllCops:
  Exclude:
    - 'vendor/**/*'
  DisplayCopNames: true
  TargetRubyVersion: 3.2
  SuggestExtensions: false
  NewCops: enable
plugins:
  - rubocop-rake
  - rubocop-minitest
  - rubocop-performance
  - rubocop-elegant
Naming/FileName:
  Regex: '^[a-z0-9\-._]*$'
Style/GlobalVars:
  Enabled: false
Style/TopLevelMethodDefinition:
  Enabled: false
Elegant/GoodMethodName:
  AllowedNames:
    - total_active_contributors
    - total_commits
    - total_contributors
    - total_files
    - total_issues
    - total_releases
    - total_repositories
    - total_stars
    - some_backlog_size
    - some_build_success_rate
    - some_issue_lifetime
    - some_merged_pulls
    - some_pull_hoc_size
    - some_release_hoc_size
    - some_release_interval
    - some_review_time
    - some_triage_time
    - total_builds_ran
    - total_commits_pushed
    - total_issues_created
    - total_releases_published
    - total_reviews_submitted
    - cover_qo
    - fill_fact_by_hash
    - issue_was_lost
    - nick_of
    - comments_info
    - count_appreciated_comments
    - fetch_workflows
    - count_suggestions
    - stub_event
    - stub_workflow_runs
    - insert_label_was_attached_fact
    - rate_limit_up
    - load_it
    - stub_github
    - stub_pull_was_merged_base
    - stub_pull_was_merged_issue
    - stub_pull_was_merged_success
  Exclude:
    - 'test/**/*'
Metrics/MethodLength:
  Enabled: false
Metrics/AbcSize:
  Enabled: false
Metrics/BlockLength:
  Enabled: false
Metrics/ClassLength:
  Enabled: false
Metrics/PerceivedComplexity:
  Enabled: false
Metrics/CyclomaticComplexity:
  Enabled: false
Naming/MethodParameterName:
  MinNameLength: 2
Elegant/ClassInModule:
  Exclude:
    - 'test/**/*'
Elegant/IndentationLadder:
  Exclude:
    - 'test/**/*'
    - 'judges/dimensions-of-terrain/total_issues.rb'
    - 'judges/github-events/github-events.rb'
    - 'judges/issue-was-unassigned/issue-was-unassigned.rb'
    - 'judges/quantity-of-deliverables/total_commits_pushed.rb'
    - 'judges/quantity-of-deliverables/total_reviews_submitted.rb'
    - 'lib/incremate.rb'
    - 'lib/pull_request.rb'
Elegant/NoRedundantVariable:
  Exclude:
    - 'test/**/*'
    - 'judges/dimensions-of-terrain/total_commits.rb'
    - 'judges/github-events/github-events.rb'
    - 'judges/quantity-of-deliverables/total_builds_ran.rb'
    - 'judges/quantity-of-deliverables/total_commits_pushed.rb'
    - 'judges/quantity-of-deliverables/total_releases_published.rb'
    - 'lib/incremate.rb'
    - 'lib/pull_request.rb'
Elegant/PairedBrackets:
  Exclude:
    - 'test/**/*'
