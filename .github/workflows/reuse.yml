---
# yamllint disable rule:line-length
name: reuse
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
  workflow_call:
jobs:
  reuse:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
      - uses: fsfe/reuse-action@676e2d560c9a403aa252096d99fcab3e1132b0f5 # v6
