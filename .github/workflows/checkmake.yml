---
name: checkmake
'on':
  push:
    branches:
      - master
  pull_request:
    branches:
      - master
jobs:
  checkmake:
    timeout-minutes: 15
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - name: checkmake
        run: docker run --rm -v ${{ github.workspace }}:/data cytopia/checkmake@sha256:ff793674494e472661bc7b4cc623c9a172515ec011c6e802be586f101bd6c043 Makefile
