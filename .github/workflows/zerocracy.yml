---
# yamllint disable rule:line-length
name: zerocracy
'on':
  schedule:
    - cron: '*/30 * * * *'
concurrency:
  group: zerocracy
  cancel-in-progress: false
permissions:
  contents: write
jobs:
  zerocracy:
    if: github.repository_owner == 'zerocracy'
    runs-on: ubuntu-24.04
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
      - uses: zerocracy/judges-action@eb509bc869bf8ec1292b184968a74039e26386ad # 0.17.17
        with:
          token: ${{ secrets.ZEROCRACY_TOKEN }}
          github-token: ${{ secrets.PAT }}
          repositories: yegor256/judges,yegor256/factbase,zerocracy/*,zerocracy/baza,yegor256/0rsk
          factbase: zerocracy.fb
          timeout: 15
          lifetime: 20
          cycles: 2
          options: |
            sqlite_cache_maxvsize=200K
            sqlite_cache_maxsize=200Mb
      - uses: zerocracy/pages-action@832b2757fb761acf015b0e0595fef9d245f06ea5 # 0.7.0
        with:
          github-token: ${{ secrets.PAT }}
          factbase: zerocracy.fb
          output: pages
      - uses: JamesIves/github-pages-deploy-action@d92aa235d04922e8f08b40ce78cc5442fcfbfa2f # v4.8.0
        with:
          folder: pages
          clean: false
