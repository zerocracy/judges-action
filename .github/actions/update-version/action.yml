---
# yamllint disable rule:line-length
name: Update Repository Version
description: Fetches the latest tag from a GitHub repository and updates README.md
inputs:
  owner:
    description: Repository owner
    required: true
  repo:
    description: Repository name
    required: true
runs:
  using: composite
  steps:
    - uses: actions/github-script@3a2844b7e9c422d3c10d287c895573f7108da1b3 # v9
      with:
        script: |
          const { data: tags } = await github.rest.repos.listTags({
            owner: '${{ inputs.owner }}',
            repo: '${{ inputs.repo }}'
          });
          const latest = tags[0]?.name;
          if (!latest) {
            core.setFailed('No tags found for ${{ inputs.owner }}/${{ inputs.repo }}');
            return;
          }
          const fs = require('fs');
          let readme = fs.readFileSync('README.md', 'utf8');
          const repo = '${{ inputs.repo }}';
          if (!/^[a-zA-Z0-9_.-]+$/.test(repo)) {
            core.setFailed('Invalid repo name: ' + repo);
            return;
          }
          const escaped = repo.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
          readme = readme.replace(new RegExp(escaped + '@.+$', 'gm'), `${{ inputs.repo }}@${latest}`);
          fs.writeFileSync('README.md', readme);
          core.info(`Updated ${{ inputs.repo }} to ${latest}`);
